name: Publish to PyPI

# Builds sdist + wheel and uploads to PyPI when a vX.Y.Z tag is pushed.
# Uses PyPI "trusted publishing" (OIDC) — no API tokens stored as secrets.
#
# One-time setup on PyPI:
#   1. Create the `mutopia` project on pypi.org (if not already)
#   2. Project settings → Publishing → Add a new pending publisher
#        Owner:             sigscape
#        Repository name:   MuTopia
#        Workflow filename: publish.yml
#        Environment name:  pypi

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/mutopia
    permissions:
      id-token: write   # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
