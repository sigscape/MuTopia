name: Publish Docker image

# Builds and pushes the MuTopia image to Docker Hub.
#
# Tag push  (vX.Y.Z) → allenlynch/mutopia:X.Y.Z, :X.Y, :X, :latest
# Main push          → allenlynch/mutopia:edge
#
# One-time setup:
#   1. Create a Docker Hub personal access token:
#        https://hub.docker.com/settings/security
#   2. Add repo secrets at Settings → Secrets and variables → Actions:
#        DOCKERHUB_USERNAME = allenlynch
#        DOCKERHUB_TOKEN    = <the PAT>

on:
  push:
    tags: ['v*.*.*']
    branches: [main]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Strip the leading "v" from the tag so it matches the PyPI version
      - name: Compute PyPI version for build-arg
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "value=" >> $GITHUB_OUTPUT
          fi

      - name: Extract image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: allenlynch/mutopia
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
